services:
  api:
    depends_on:
      dragonfly:
        condition: service_healthy
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    volumes:
      - dragonfly_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    ulimits:
      memlock: -1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  dragonfly_data:
