services:
  mysql:
    image: mysql:9-debian
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: "{{PROJECT_NAME}}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
